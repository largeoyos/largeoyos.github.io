<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载教程... | LarGeoYos</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../css/style.css">
    <!-- 引入提取出的 Blue Topaz 主题样式 -->
    <link rel="stylesheet" href="../css/blue-topaz.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- 引入 highlight.js 做代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        .meta-info {
            text-align: center;
            color: #636e72;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        /* 红/橙色系的主题头部，区别于普通博客 */
        header.tutorial-header {
            background: linear-gradient(135deg, #d63031 0%, #2d3436 100%);
        }
    </style>
</head>
<body>

<nav class="global-nav">
    <a href="../index.html">🏠 工作主页</a>
    <a href="../blog/index.html">📝 博客大厅</a>
    <a href="./index.html">📚 AI 教学</a>
    <a href="../games/index.html">🎮 游戏大厅</a>
</nav>

<header class="tutorial-header">
    <h1 id="header-title">📖 深度教学</h1>
    <div class="meta-info" id="meta-container" style="color: white; margin-top: 10px; margin-bottom: 0;">
        <!-- 动态生成 -->
    </div>
</header>

<div class="container">
    <div class="markdown-body" id="content">
        <em>📡 正在从节点同步文档资料，由于篇幅较长请稍候...</em>
    </div>

    <div id="doc-navigation" style="margin-top: 3rem; text-align: center; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;">
        <!-- 动态渲染导航 -->
    </div>
</div>

<footer>
    <p>© 2026 Largeoyos · Built with ❤️ and Hosted on GitHub Pages</p>    <p><small>Version 1.2.0</small></p></footer>

<script>
    async function loadDoc() {
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');

        if (!docId) {
            document.getElementById('content').innerHTML = "<h1>❌ 错误</h1><p>未指定文章 ID。</p>";
            document.title = "文档未找到 | LarGeoYos";
            return;
        }

        try {
            const metaRes = await fetch('docs.json');
            const docs = await metaRes.json();
            const docMeta = docs.find(p => p.id === docId);

            if (!docMeta) {
                document.getElementById('content').innerHTML = "<h1>❌ 404</h1><p>该教学文档不存在或已被删除。</p>";
                document.title = "教学缺失 | LarGeoYos";
                return;
            }

            document.getElementById('header-title').innerText = docMeta.title;
            document.title = `${docMeta.title} | AI教学`;
            document.getElementById('meta-container').innerHTML = `
                <span>📅 归档于：${docMeta.date}</span>
                <span style="margin: 0 10px;">|</span>
                <span class="tag" style="background: #e17055; color: white; border:1px solid white;">专栏：${docMeta.category}</span>
            `;

            // 请求对应的长图文教程
            const mdRes = await fetch(`docs/${docMeta.category}/${docId}.md`);
            if (!mdRes.ok) throw new Error("对应的 Markdown 源文件丢失。");
            const mdText = await mdRes.text();

            document.getElementById('content').innerHTML = marked.parse(mdText);

            // 应用代码语法高亮并添加复制按钮
            document.querySelectorAll('pre').forEach((preEl) => {
                const codeEl = preEl.querySelector('code');
                if (codeEl) {
                    hljs.highlightElement(codeEl);
                }

                // 创建复制按钮
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-code-btn';
                copyBtn.innerText = '复制';
                
                copyBtn.addEventListener('click', async () => {
                    try {
                        const codeText = codeEl ? codeEl.innerText : preEl.innerText;
                        await navigator.clipboard.writeText(codeText);
                        copyBtn.innerText = '已复制!';
                        setTimeout(() => {
                            copyBtn.innerText = '复制';
                        }, 2000);
                    } catch (err) {
                        console.error('复制失败!', err);
                        copyBtn.innerText = '失败';
                    }
                });

                preEl.appendChild(copyBtn);
            });
            
            // 生成底部导航按钮
            const categoryDocs = docs.filter(d => d.category === docMeta.category);
            const currentIndex = categoryDocs.findIndex(p => p.id === docId);
            const prevDoc = categoryDocs[currentIndex - 1];
            const nextDoc = categoryDocs[currentIndex + 1];

            const navContainer = document.getElementById('doc-navigation');
            let navHtml = '';

            if (prevDoc) {
                navHtml += `<a href="?id=${prevDoc.id}" class="card" style="padding: 10px 20px; border-left: none; background: #e17055; color: white;">⏮ 上一篇</a>`;
            } else {
                navHtml += `<a href="index.html" class="card" style="padding: 10px 20px; border-left: none; background: #636e72; color: white;">🏠 回到长教程主页</a>`;
            }

            navHtml += `<a href="#" onclick="window.scrollTo({top:0, behavior:'smooth'}); return false;" class="card" style="padding: 10px 20px; border-left: none; background: var(--accent); color: white;">⬆️ 回到最上</a>`;

            if (nextDoc) {
                navHtml += `<a href="?id=${nextDoc.id}" class="card" style="padding: 10px 20px; border-left: none; background: #e17055; color: white;">下一篇 ⏭</a>`;
            } else {
                navHtml += `<a href="index.html" class="card" style="padding: 10px 20px; border-left: none; background: #636e72; color: white;">🏠 回到长教程主页</a>`;
            }

            navContainer.innerHTML = navHtml;

        } catch (err) {
            document.getElementById('content').innerHTML = `<h1>🚨 渲染中断</h1><p>加载资料时出现异常：${err.message}</p>`;
        }
    }

    loadDoc(); 
</script>

</body>
</html>
